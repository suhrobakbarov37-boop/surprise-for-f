<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сюрприз</title>

<style>

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{
transform:scale(1);
opacity:1;
}
100%{
transform:scale(25);
opacity:0;
}
}
.open{
animation:openGift 0.6s forwards;
}

@keyframes openGift{
0%{transform:scale(1);}
50%{transform:scale(1.3) rotate(10deg);}
100%{transform:scale(0);}
}

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:starFall linear forwards;
}

@keyframes starFall{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}
}   
body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
text-align:center;
overflow:hidden;

}

/* НЕОНОВЫЙ ЗАГОЛОВОК */

.neon{
font-size:50px;
text-shadow:
0 0 5px #fff,
0 0 10px #fff,
0 0 20px #ff4d6d,
0 0 40px #ff4d6d;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:
0 0 5px #fff,
0 0 10px #ff4d6d,
0 0 20px #ff4d6d;
}
to{
text-shadow:
0 0 10px #fff,
0 0 20px #ff758c,
0 0 40px #ff758c;
}
}

.tip{
font-size:18px;
margin-bottom:10px;
}

/* ПОДАРОК */

.gift{
font-size:90px;
cursor:pointer;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

/* ТОРТ */

#cake{
display:none;
font-size:80px;
margin-top:10px;
}

/* ПОЗДРАВЛЕНИЕ */

#message{
display:none;
max-width:450px;
font-size:20px;
margin-top:10px;
}

/* КНОПКА */

.surpriseBtn{
margin-top:20px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:linear-gradient(45deg,#ff4d6d,#ff9a9e);
color:white;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
display:none;
}

.surpriseBtn:hover{
transform:scale(1.1);
}

/* ЗАТЕМНЕНИЕ */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:1;
}

/* СЮРПРИЗ */

#bigSurprise{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#ff4d6d;
padding:30px;
border-radius:20px;
font-size:20px;
max-width:400px;
text-align:center;
z-index:2;
}

/* КНОПКА НАЗАД */

.backBtn{
margin-top:15px;
padding:10px 25px;
font-size:16px;
border:none;
border-radius:20px;
cursor:pointer;
background:#ff4d6d;
color:white;
}

/* КОНФЕТТИ */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px) rotate(0);}
100%{transform:translateY(100vh) rotate(360deg);}
}
@media (max-width:600px){

.neon{
font-size:32px;
}

.tip{
font-size:16px;
}

.gift{
font-size:70px;
}

#cake{
font-size:60px;
}

#message{
font-size:17px;
padding:0 20px;
}

.surpriseBtn{
font-size:16px;
padding:12px 25px;
}

#bigSurprise{
width:85%;
font-size:18px;
}

}

</style>
</head>

<body>

<h1 class="neon">🎉 Сюрприз для Ф 🎉</h1>
<h2 id="timer"></h2>
<p class="tip">Нажми на подарок 🎁</p>

<div class="gift" onclick="openGift()">🎁</div>

<div id="cake">🎂</div>

<div id="message">

🎉 С днём рождения 🎉 <br><br>

Желаю тебе счастья,  
много радости и улыбок.  

Пусть каждый день будет  
интересным и весёлым.  

Пусть рядом будут  
хорошие друзья  
и много приятных моментов.  

Пусть мечты постепенно  
сбываются ✨

</div>

<button class="surpriseBtn" onclick="showSurprise()" id="btn">
✨ Ещё сюрприз
</button>

<div id="overlay"></div>

<div id="bigSurprise">

<p id="typing"></p>

<button class="backBtn" onclick="closeSurprise()">Назад</button>

</div>

<script>
function updateTimer(){

const birthday = new Date("April 13, 2026 00:00:00").getTime();

const now = new Date().getTime();

const distance = birthday - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("timer").innerHTML =
"До сюрприза осталось: " +
days + "д " +
hours + "ч " +
minutes + "м " +
seconds + "с";

}

setInterval(updateTimer,1000);
function openGift(){

let gift=document.querySelector(".gift");

gift.classList.add("open");

setTimeout(()=>{

gift.style.display="none";

document.getElementById("cake").style.display="block";

document.getElementById("message").style.display="block";

document.getElementById("btn").style.display="inline-block";

bigFirework();

},600);

}

function showSurprise(){

document.getElementById("overlay").style.display="block";
document.getElementById("bigSurprise").style.display="block";

typeText();

}

function closeSurprise(){

document.getElementById("overlay").style.display="none";
document.getElementById("bigSurprise").style.display="none";
document.getElementById("typing").innerHTML="";

}

const text="Надеюсь этот маленький сайт смог тебя немного удивить 😊 Пусть у тебя сегодня будет очень хороший день, много радости, улыбок и приятных моментов. С днём рождения 🎉";

let i=0;

function typeText(){

let typing=document.getElementById("typing");

typing.innerHTML="";

i=0;

function write(){

if(i<text.length){
typing.innerHTML+=text.charAt(i);
i++;
setTimeout(write,40);
}

}

write();

}



function confetti(){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

document.body.appendChild(c);

setTimeout(()=>{c.remove()},4000);

}

setInterval(confetti,200);
function createStar(){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.animationDuration=(Math.random()*4+2)+"s";

document.body.appendChild(star);

setTimeout(()=>{star.remove()},6000);

}

setInterval(createStar,120);
function firework(){

for(let i=0;i<50;i++){

let f=document.createElement("div");

f.className="firework";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";

f.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},1000);

}

}

function bigFirework(){

firework();
setTimeout(firework,400);
setTimeout(firework,800);

}
</script>

</body>
</html>
